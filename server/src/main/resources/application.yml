spring:
  application:
    name: kuhhandel-server
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
    open-in-view: false

server:
  port: ${SERVER_PORT:8080}
  tomcat:
    # Keep TCP connections alive longer than the Cloudflare edge idle window, so the heartbeat
    # frames have something to flow through.
    connection-timeout: 60s
    keep-alive-timeout: 60s
    # WebSocket sessions are long-lived; we do not want Tomcat to drop them after the default
    # 100 HTTP keep-alive requests (the limit is meant for plain HTTP, not upgraded connections).
    max-keep-alive-requests: -1

kuhhandel:
  websocket:
    allowed-origins:
      - http://localhost:8080
      - http://localhost:3000
  cluster:
    # Multi-pod coordination, configured via env (relaxed binding):
    #   KUHHANDEL_CLUSTER_PEERSERVICE  headless service DNS (k8s)
    #   KUHHANDEL_CLUSTER_PEERS        static URLs for local testing
    #   KUHHANDEL_CLUSTER_SECRET       shared secret, required once peers are set
    # Without peers the server runs single-pod and /internal/cluster rejects everything.
    peer-port: 8080
    timeout-sweeper:
      interval-ms: 1000
      initial-delay-ms: 5000
    stale-game-reaper:
      # Purge games with no player activity for this long. Timeout advances do NOT count as
      # activity, so abandoned games are reaped instead of being advanced by the sweeper forever.
      stale-after-ms: 1800000
      interval-ms: 60000
      initial-delay-ms: 60000
