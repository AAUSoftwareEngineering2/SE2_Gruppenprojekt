# Diese Datei sagt: Die App-Basis wird als Production-App deployed.
#
# Hier steht alles, was für Production anders sein darf als später für Staging:
# Namespace, Image-Tag und Anzahl der Pods.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: kuhhandel

resources:
  - ../../../base/app

images:
  - name: ghcr.io/aausoftwareengineering2/kuhhandel-server
    newTag: production

# Backend ist stateless (Spielzustand liegt komplett in der DB), daher 3 Pods.
# Die topologySpreadConstraints verteilen sie auf die drei K3s-Nodes.
replicas:
  - name: kuhhandel-server
    count: 3

# Der temporäre Single-Pod-PDB-Patch (minAvailable: 0) ist raus, das Basis-PDB gilt wieder.
