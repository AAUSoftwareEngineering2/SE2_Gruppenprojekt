# Diese Datei sammelt die gemeinsamen Kubernetes-Dateien.
#
# Production und später Staging können diese Basis verwenden, ohne alle
# Dateien doppelt zu pflegen.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - namespace.yaml
  - supabase-ca-configmap.yaml
  - kuhhandel-server-deployment.yaml
  - kuhhandel-server-service.yaml
  - kuhhandel-server-pdb.yaml
  - cloudflared-deployment.yaml
  - cloudflared-pdb.yaml
