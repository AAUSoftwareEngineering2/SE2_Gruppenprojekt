# Beispiel für das Cloudflare-Tunnel-Secret.
#
# Diese Datei ist NUR eine Vorlage. Der echte Tunnel-Token darf nicht ins Repo.
# Das echte Secret heißt `cloudflared-token` und liegt im Namespace
# `cloudflare`. Das Deployment liest daraus den Key `token` und setzt ihn als
# Environment Variable `TUNNEL_TOKEN`.
#
# Diese Beispieldatei wird absichtlich nicht in `kustomization.yaml`
# referenziert.
apiVersion: v1
kind: Secret
metadata:
  name: cloudflared-token
# string token
type: Opaque
stringData:
  token: "REPLACE_WITH_CLOUDFLARE_TUNNEL_TOKEN"
