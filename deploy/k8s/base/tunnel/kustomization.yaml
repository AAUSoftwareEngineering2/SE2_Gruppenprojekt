# Diese Datei sammelt nur die gemeinsamen Kubernetes-Dateien für den Tunnel.
#
# Der Namespace steht absichtlich nicht hier, sondern im jeweiligen Overlay.
# Dadurch kann später Staging denselben Tunnel-Aufbau mit anderem Namespace
# wiederverwenden.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - deployment.yaml
  - pdb.yaml
