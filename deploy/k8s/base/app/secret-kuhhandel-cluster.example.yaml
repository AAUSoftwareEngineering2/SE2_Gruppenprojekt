# Vorlage für das Cluster-Secret, Platzhalter ersetzen statt direkt anwenden.
#
# Das Secret authentifiziert die Pod-zu-Pod-Benachrichtigungen (/internal/cluster/...) und
# muss in jedem Namespace existieren, in dem der Server läuft:
#
#   kubectl -n kuhhandel create secret generic kuhhandel-cluster \
#     --from-literal=KUHHANDEL_CLUSTER_SECRET="$(openssl rand -hex 32)"
#   kubectl -n kuhhandel-staging create secret generic kuhhandel-cluster \
#     --from-literal=KUHHANDEL_CLUSTER_SECRET="$(openssl rand -hex 32)"
apiVersion: v1
kind: Secret
metadata:
  name: kuhhandel-cluster
type: Opaque
stringData:
  KUHHANDEL_CLUSTER_SECRET: "REPLACE_WITH_RANDOM_CLUSTER_SECRET"
