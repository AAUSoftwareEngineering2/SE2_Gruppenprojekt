# Beispiel für das Datenbank-Secret des Kuhhandel-Servers.
#
# Diese Datei ist NUR eine Vorlage. Hier gehören keine echten Passwörter
# hinein. Der echte Cluster hat ein Secret mit dem Namen `kuhhandel-db`.
# Das Deployment liest genau diese drei Keys:
# - SPRING_DATASOURCE_URL
# - SPRING_DATASOURCE_USERNAME
# - SPRING_DATASOURCE_PASSWORD
#
# Diese Beispieldatei wird absichtlich nicht in `kustomization.yaml`
# referenziert, damit niemand versehentlich Platzhalter deployed.
# Der Namespace kommt bei echten Deployments über das Overlay oder über
# `kubectl -n kuhhandel`.
apiVersion: v1
kind: Secret
metadata:
  name: kuhhandel-db
type: Opaque
stringData:
  SPRING_DATASOURCE_URL: "jdbc:postgresql://REPLACE_WITH_SUPABASE_POOLER_HOST:5432/postgres?sslmode=verify-full&sslrootcert=/etc/ssl/supabase/prod-ca-2021.crt"
  SPRING_DATASOURCE_USERNAME: "REPLACE_WITH_SUPABASE_DB_USER"
  SPRING_DATASOURCE_PASSWORD: "REPLACE_WITH_SUPABASE_DB_PASSWORD"
