name: kuhhandel-infra

services:
  postgres:
    image: ${POSTGRES_IMAGE:-postgres:17-alpine}
    container_name: kuhhandel-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_SUPERUSER:?POSTGRES_SUPERUSER is required}
      POSTGRES_PASSWORD: ${POSTGRES_SUPERUSER_PASSWORD:?POSTGRES_SUPERUSER_PASSWORD is required}
      POSTGRES_DB: postgres
      APP_DB_USER: ${APP_DB_USER:?APP_DB_USER is required}
      APP_DB_PASSWORD: ${APP_DB_PASSWORD:?APP_DB_PASSWORD is required}
      STAGING_DB_NAME: ${STAGING_DB_NAME:?STAGING_DB_NAME is required}
      PRODUCTION_DB_NAME: ${PRODUCTION_DB_NAME:?PRODUCTION_DB_NAME is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - backend

volumes:
  postgres_data:
    name: kuhhandel-postgres-data

networks:
  backend:
    name: kuhhandel-backend
