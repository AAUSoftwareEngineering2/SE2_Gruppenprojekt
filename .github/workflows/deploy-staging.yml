name: Deploy Staging

on:
  push:
    branches:
      - staging
    paths:
      - ".dockerignore"
      - "build.gradle.kts"
      - "settings.gradle.kts"
      - "gradle.properties"
      - "gradle/**"
      - "gradlew"
      - "gradlew.bat"
      - "shared/**"
      - "server/**"
      - "deploy/compose.staging.yaml"
      - ".github/workflows/deploy-staging.yml"
  workflow_dispatch:

concurrency:
  group: deploy-staging
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/aausoftwareengineering2/kuhhandel-server

jobs:
  deploy:
    name: Build and Deploy Staging
    runs-on: ubuntu-latest
    environment: staging
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: server/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:staging
            ${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Prepare SSH
        shell: bash
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          cat <<EOF > ~/.ssh/config
          Host deploy-target
            HostName ${DEPLOY_HOST}
            User ${DEPLOY_USER}
            Port ${DEPLOY_PORT:-22}
            IdentityFile ~/.ssh/deploy_key
            IdentitiesOnly yes
            BatchMode yes
            StrictHostKeyChecking yes
            UserKnownHostsFile ~/.ssh/known_hosts
          EOF
          chmod 600 ~/.ssh/config

      - name: Upload compose file
        shell: bash
        run: |
          ssh deploy-target 'mkdir -p "$HOME/kuhhandel"'
          scp deploy/compose.staging.yaml deploy-target:~/kuhhandel/compose.staging.yaml

      - name: Pull image and restart staging service
        shell: bash
        run: |
          ssh deploy-target '
            set -e
            cd "$HOME/kuhhandel"
            docker compose --env-file .env.infra -f compose.staging.yaml pull
            docker compose --env-file .env.infra -f compose.staging.yaml up -d --remove-orphans

            for attempt in $(seq 1 20); do
              if curl -fsS http://127.0.0.1:18081/health >/dev/null; then
                docker image prune -f
                exit 0
              fi
              sleep 3
            done

            docker compose --env-file .env.infra -f compose.staging.yaml logs --tail=200
            exit 1
          '
