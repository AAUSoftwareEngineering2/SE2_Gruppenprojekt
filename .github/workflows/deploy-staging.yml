name: Build Staging Image

on:
  push:
    branches:
      - staging
    paths:
      - ".dockerignore"
      - "build.gradle.kts"
      - "settings.gradle.kts"
      - "gradle.properties"
      - "gradle/**"
      - "gradlew"
      - "gradlew.bat"
      - "shared/**"
      - "server/**"
      - "deploy/k8s/**"
      - ".github/workflows/deploy-staging.yml"
  workflow_dispatch:

concurrency:
  group: build-staging
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/aausoftwareengineering2/kuhhandel-server

jobs:
  build:
    name: Build Staging Image
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare staging image version
        id: image-version
        shell: bash
        run: |
          set -euo pipefail

          SHORT_SHA="${GITHUB_SHA::7}"
          VERSION="staging-${GITHUB_RUN_NUMBER}-${SHORT_SHA}"

          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: server/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.image-version.outputs.version }}
            ${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
            ${{ env.IMAGE_NAME }}:staging
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.image-version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Print image tags
        shell: bash
        run: |
          echo "Pushed staging image:"
          echo "${IMAGE_NAME}:${{ steps.image-version.outputs.version }}"
          echo "${IMAGE_NAME}:sha-${GITHUB_SHA}"
          echo "${IMAGE_NAME}:staging"
