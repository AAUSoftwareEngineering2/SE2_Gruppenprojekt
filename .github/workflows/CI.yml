name: CI

on:
  push:
  pull_request:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  verify-and-analyze:
    name: Build, Test, and Analyze
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Temurin JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run Ktlint check
        run: ./gradlew ktlintCheck --stacktrace

      - name: Test shared module
        run: ./gradlew :shared:test :shared:jacocoTestReport --stacktrace

      - name: Test server module
        run: ./gradlew :server:test :server:jacocoTestReport --stacktrace

      - name: Set up Android SDK (API 35)
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-35 build-tools;35.0.0'
          accept-android-sdk-licenses: true
          log-accepted-android-sdk-licenses: false

      - name: Test app module
        run: ./gradlew :app:testDebugUnitTest :app:jacocoTestReport --stacktrace

      - name: Perform SonarCloud analysis
        if: github.ref == 'refs/heads/main' || github.event_name == 'pull_request'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: ./gradlew sonar --info

      - name: Upload all reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: project-reports
          path: |
            **/build/reports/**
            **/build/test-results/**
          if-no-files-found: ignore
