name: Server - SonarCloud
on:
  push:
    branches:
      - main
    paths:
      - 'server/**' # Startet nur bei Änderungen im Server-Ordner
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'server/**'
jobs:
  build:
    name: Build and analyze Server
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./server # Setzt den Ausführungsordner
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: 'zulu'
      - name: Cache SonarCloud packages
        uses: actions/cache@v5
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar
      - name: Cache Maven packages
        uses: actions/cache@v5
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('server/**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2
      - name: Build and analyze
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN_SERVER }} 
        run: ./mvnw -B verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar