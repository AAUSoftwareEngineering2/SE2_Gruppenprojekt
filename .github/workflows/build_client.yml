name: Client - SonarCloud
on:
  push:
    branches:
      - main
    paths:
      - 'client/**' # Startet nur bei Änderungen im Client-Ordner
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'client/**'
jobs:
  build:
    name: Build and analyze Client
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./client # Setzt den Ausführungsordner für alle 'run' Befehle
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: 17
          distribution: 'zulu'
      - name: Cache SonarQube packages
        uses: actions/cache@v5
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar
      - name: Cache Gradle packages
        uses: actions/cache@v5
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('client/**/*.gradle*', 'client/**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle
      - name: Build and analyze
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: ./gradlew build sonar --info