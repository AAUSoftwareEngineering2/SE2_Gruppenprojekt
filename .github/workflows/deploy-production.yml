name: Build Production Image

on:
  push:
    branches:
      - main
    paths:
      - ".dockerignore"
      - "build.gradle.kts"
      - "settings.gradle.kts"
      - "gradle.properties"
      - "gradle/**"
      - "gradlew"
      - "gradlew.bat"
      - "shared/**"
      - "server/**"
      - ".github/workflows/deploy-production.yml"
  workflow_dispatch:

# Nur EIN Production-Build gleichzeitig (gleiche group). cancel-in-progress: false =
# ein laufendes Release wird NICHT abgebrochen (bei staging ist es true = abbrechen).
concurrency:
  group: build-production
  cancel-in-progress: false

permissions:
  contents: write
  packages: write
  pull-requests: read

env:
  IMAGE_NAME: ghcr.io/aausoftwareengineering2/kuhhandel-server

jobs:
  build:
    name: Build Production Image
    runs-on: ubuntu-latest
    # GitHub-Environment "production" - kann eigene Secrets / Freigabe-Regeln haben.
    environment: production

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          # ganze Git-History holen - unten für die Versions-Tags nötig.
          fetch-depth: 0

      - name: Set up Temurin JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Set up Android SDK (API 36)
        uses: android-actions/setup-android@v4
        with:
          packages: 'platform-tools platforms;android-36 build-tools;36.0.0'
          accept-android-sdk-licenses: true
          log-accepted-android-sdk-licenses: false

      # Qualitäts-Gate: Lint + alle Tests müssen grün sein, sonst wird kein Image gebaut.
      - name: Run deployment test gate
        run: ./gradlew ktlintCheck :shared:test :server:test :app:testDebugUnitTest --stacktrace

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Bestimmt die nächste Versionsnummer (Semantic Versioning):
      # 1) liest am PR das Label release/patch|minor|major (Default: patch),
      # 2) hat der Commit schon ein vX.Y.Z-Tag -> dieses wiederverwenden,
      # 3) sonst aus dem letzten Tag die nächste Version hochzählen.
      - name: Prepare production image version
        id: image-version
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          # alle Versions-Tags holen (Vergleichsbasis fürs Hochzählen)
          git fetch --tags --force

          # den PR zu diesem Commit über die GitHub-API holen (daraus kommt das Release-Label)
          PRS_JSON="$(gh api "repos/${GITHUB_REPOSITORY}/commits/${GITHUB_SHA}/pulls" -H "Accept: application/vnd.github+json")"
          PR_NUMBER="$(jq -r '.[0].number // empty' <<< "${PRS_JSON}")"
          BUMP_LABELS="$(jq -r '.[0].labels[]?.name // empty' <<< "${PRS_JSON}" | awk '/^release\/(patch|minor|major)$/ { print }')"
          BUMP_LABEL_COUNT="$(printf '%s\n' "${BUMP_LABELS}" | awk 'NF { count++ } END { print count + 0 }')"

          # mehr als ein release/-Label am PR -> Fehler (nur genau eins erlaubt)
          if [[ "${BUMP_LABEL_COUNT}" -gt 1 ]]; then
            echo "Only one release label is allowed per PR."
            printf 'Found release labels:\n'
            printf '%s\n' "${BUMP_LABELS}" | awk 'NF { print "- " $0 }'
            exit 1
          fi

          # kein (oder kein gültiges) Label -> Standard-Sprung = patch
          BUMP="patch"
          # genau ein Label -> dessen Sprung nehmen ("release/" abschneiden -> patch|minor|major)
          if [[ "${BUMP_LABEL_COUNT}" -eq 1 ]]; then
            BUMP="${BUMP_LABELS#release/}"
          fi

          if [[ -n "${PR_NUMBER}" ]]; then
            echo "Using release bump '${BUMP}' from PR #${PR_NUMBER}."
          else
            echo "No associated PR found for this commit. Defaulting to release bump 'patch'."
          fi

          EXISTING_VERSION_FOR_SHA="$(git tag --points-at "${GITHUB_SHA}" --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | awk '/^v[0-9]+\.[0-9]+\.[0-9]+$/ { print; exit }')"

          # hat dieser Commit schon ein vX.Y.Z-Tag? Dann das wiederverwenden (kein neues bauen).
          if [[ -n "${EXISTING_VERSION_FOR_SHA}" ]]; then
            VERSION="${EXISTING_VERSION_FOR_SHA}"
            echo "Reusing existing release tag '${VERSION}' for this commit."
          else
            LATEST_TAG="$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | awk '/^v[0-9]+\.[0-9]+\.[0-9]+$/ { print; exit }')"

            # noch gar kein Tag im Repo -> Startversion (major-Label: v1.0.0, sonst v0.1.0)
            if [[ -z "${LATEST_TAG}" ]]; then
              if [[ "${BUMP}" == "major" ]]; then
                VERSION="v1.0.0"
              else
                VERSION="v0.1.0"
              fi
            else
              RAW_VERSION="${LATEST_TAG#v}"
              # das letzte Tag (ohne führendes v) in MAJOR / MINOR / PATCH zerlegen
              IFS='.' read -r MAJOR MINOR PATCH <<< "${RAW_VERSION}"

              # je nach Sprung die passende Stelle erhöhen (niedrigere auf 0 setzen)
              case "${BUMP}" in
                patch)
                  PATCH=$((PATCH + 1))
                  ;;
                minor)
                  MINOR=$((MINOR + 1))
                  PATCH=0
                  ;;
                major)
                  MAJOR=$((MAJOR + 1))
                  MINOR=0
                  PATCH=0
                  ;;
                *)
                  echo "Unsupported release bump: ${BUMP}"
                  exit 1
                  ;;
              esac

              VERSION="v${MAJOR}.${MINOR}.${PATCH}"
            fi

            # falls die berechnete Version schon als Tag existiert: weiter hochzählen, bis frei
            while git rev-parse --verify --quiet "refs/tags/${VERSION}" >/dev/null; do
              RAW_VERSION="${VERSION#v}"
              IFS='.' read -r MAJOR MINOR PATCH <<< "${RAW_VERSION}"
              PATCH=$((PATCH + 1))
              VERSION="v${MAJOR}.${MINOR}.${PATCH}"
            done
          fi

          echo "bump=${BUMP}" >> "${GITHUB_OUTPUT}"
          # Ergebnis (version + bump) an die folgenden Schritte weitergeben (GITHUB_OUTPUT)
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"

      # baut server/Dockerfile und pusht das Image mit 3 Tags: vX.Y.Z, sha-<sha>, production.
      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: server/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.image-version.outputs.version }}
            ${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
            ${{ env.IMAGE_NAME }}:production
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.image-version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Print image tags
        shell: bash
        run: |
          echo "Pushed production image:"
          echo "Release bump: ${{ steps.image-version.outputs.bump }}"
          echo "${IMAGE_NAME}:${{ steps.image-version.outputs.version }}"
          echo "${IMAGE_NAME}:sha-${GITHUB_SHA}"
          echo "${IMAGE_NAME}:production"

      # Git-Tag vX.Y.Z anlegen und pushen (falls noch nicht vorhanden).
      - name: Create and push Git tag
        shell: bash
        run: |
          set -euo pipefail

          VERSION="${{ steps.image-version.outputs.version }}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git ls-remote --exit-code --tags origin "refs/tags/${VERSION}" >/dev/null; then
            echo "Tag ${VERSION} already exists on origin."
          else
            git tag -a "${VERSION}" -m "Release ${VERSION}"
            git push origin "${VERSION}"
          fi

      # GitHub-Release zum Tag erstellen, mit automatisch generierten Release-Notes.
      - name: Create GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          VERSION="${{ steps.image-version.outputs.version }}"

          if gh release view "${VERSION}" >/dev/null 2>&1; then
            echo "Release ${VERSION} already exists."
          else
            gh release create "${VERSION}" \
              --verify-tag \
              --title "Release ${VERSION}" \
              --generate-notes \
              --latest
          fi
